name: Actualizar Skills Manifest

on:
  push:
    paths:
      - '**/*.md'
  workflow_dispatch:

# 🎯 Agregamos esta variable para forzar el uso de Node 24 en las acciones de GitHub
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Ejecutar Script de actualización
        run: node update_manifest.js

      - name: Hacer Commit y Push si hay cambios
        run: |
          git config --local user.name "GitHub Action"
          git config --local user.email "action@github.com"
          git add skills-manifest.json
          git commit -m "🤖 auto-update: actualiza skills-manifest.json" || echo "No hay cambios para subir"
          git push
