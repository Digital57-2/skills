name: Actualizar Skills Manifest

on:
  push:
    paths:
      - '**/*.md' # Se ejecuta solo si se modifican archivos Markdown

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Ejecutar Script
        run: node update_manifest.py

      - name: Hacer Commit y Push si hay cambios
        run: |
          git config --local user.name "GitHub Action"
          git config --local user.email "action@github.com"
          git add skills-manifest.json
          git commit -m "🤖 auto-update: actualiza skills-manifest.json" || echo "No hay cambios para subir"
          git push
