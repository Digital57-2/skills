name: Actualizar Skills Manifest

on:
  push:
    paths:
      - '**/*.md' # Se ejecuta automáticamente al modificar o subir Markdowns
  workflow_dispatch: # Agregamos esto para que también puedas ejecutarlo manualmente desde GitHub si quieres

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Usamos una versión estable de Node

      - name: Ejecutar Script de actualización
        run: node update_manifest.js

      - name: Hacer Commit y Push si hay cambios
        run: |
          git config --local user.name "GitHub Action"
          git config --local user.email "action@github.com"
          git add skills-manifest.json
          git commit -m "🤖 auto-update: actualiza skills-manifest.json" || echo "No hay cambios para subir"
          git push
